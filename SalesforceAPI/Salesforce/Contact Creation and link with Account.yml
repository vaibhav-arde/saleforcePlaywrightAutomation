info:
  name: Contact Creation and link with Account
  type: http
  seq: 4

http:
  method: POST
  url: "{{instance_url}}/services/data/v66.0/sobjects/Contact"
  body:
    type: json
    data: |-
      {
        "FirstName": "Created from",
        "LastName": "Bruno",
        "AccountId": "{{account_id}}"
      }
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        const response = res.getBody();

        test("Status code should be 201 or 200", function () {
          expect([200, 201]).to.include(res.getStatus());
        });

        test("Response should contain contact id", function () {
          expect(response).to.have.property("id");
          expect(response.id).to.be.a("string").and.not.empty;
        });

        test("Contact id should start with 003", function () {
          expect(response.id.startsWith("003")).to.equal(true);
        });

        test("Success should be true", function () {
          expect(response).to.have.property("success");
          expect(response.success).to.equal(true);
        });

        test("Errors should be an empty array", function () {
          expect(response).to.have.property("errors");
          expect(response.errors).to.be.an("array").that.is.empty;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
