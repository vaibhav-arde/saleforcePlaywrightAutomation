info:
  name: Token
  type: http
  seq: 1

http:
  method: POST
  url: https://login.salesforce.com/services/oauth2/token?username={{username}}&password={{password}}&grant_type=password&client_id={{client_id}}&client_secret={{client_secret}}
  params:
    - name: username
      value: "{{username}}"
      type: query
    - name: password
      value: "{{password}}"
      type: query
    - name: grant_type
      value: password
      type: query
    - name: client_id
      value: "{{client_id}}"
      type: query
    - name: client_secret
      value: "{{client_secret}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
