name: Playwright Salesforce Automation

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Target Environment'
        required: true
        type: choice
        options: [sale, dev, qa]
        default: 'sale'
      test_type:
        description: 'Test Type'
        required: true
        type: choice
        options: [api, smoke, regression]
        default: 'api'

env:
  NODE_VERSION: 20

jobs:
  setup:
    name: Setup & Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      # Cache Playwright browsers
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install Browsers if needed
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  test:
    name: Test (${{ inputs.test_env || 'sale' }} / ${{ matrix.project }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        project: [chromium]

    environment: ${{ inputs.test_env || 'sale' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      # ✅ FIX 1: Restore Playwright cache
      - name: Restore Playwright Browsers Cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      # ✅ Install only if cache miss
      - name: Install Browsers if needed
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.project }}

      # Run tests based on input
      - name: Run Playwright Tests
        run: |
          if [ "${{ inputs.test_type }}" = "api" ]; then
            npx playwright test --project=${{ matrix.project }} --grep @api
          elif [ "${{ inputs.test_type }}" = "smoke" ]; then
            npx playwright test --project=${{ matrix.project }} --grep @smoke
          else
            npx playwright test --project=${{ matrix.project }}
          fi
        env:
          CI: true
          TestEnv: ${{ inputs.test_env || 'sale' }}
          BASE_URL: ${{ secrets.BASE_URL }}

          # ✅ FIX 2: Match your code expectations
          sit_salesforce_username: ${{ secrets.SIT_SALESFORCE_USERNAME }}
          sit_salesforce_password_api: ${{ secrets.SIT_SALESFORCE_PASSWORD_API }}
          sit_salesforce_password_ui: ${{ secrets.SIT_SALESFORCE_PASSWORD_UI }}

          consumer_key: ${{ secrets.CONSUMER_KEY }}
          consumer_secret: ${{ secrets.CONSUMER_SECRET }}

      # Upload reports (always)
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      # Upload failures only
      - name: Upload Test Failures
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.project }}
          path: test-results/
          retention-days: 7