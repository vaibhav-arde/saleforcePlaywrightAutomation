name: Playwright Salesforce Automation
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: ESLint Check
        run: npm run lint
      - name: Prettier Check
        run: npm run format:check
      - name: TypeScript Type Check
        run: npm run typecheck

  test:
    name: Test (${{ matrix.project }})
    needs: lint
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.project }}
      - name: Run Playwright Tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true
          TestEnv: ${{ vars.TESTENV }}
          sit_salesforce_username: ${{ secrets.SIT_SALESFORCE_USERNAME }}
          sit_salesforce_password_api: ${{ secrets.SIT_SALESFORCE_PASSWORD_API }}
          sit_salesforce_password_ui: ${{ secrets.SIT_SALESFORCE_PASSWORD_UI }}
          consumer_key: ${{ secrets.CONSUMER_KEY }}
          consumer_secret: ${{ secrets.CONSUMER_SECRET }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.project }}
          path: test-results/
          retention-days: 7
